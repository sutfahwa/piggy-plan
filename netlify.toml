# Netlify build config for the Piggy Plan web app (Vite static build).
# No backend, no server-side routing — Netlify just serves dist/.
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Auth page is hidden — the login screen is not built, and any attempt to reach
# it (e.g. an old bookmark) is sent back to the app instead of 404.
[[redirects]]
  from = "/login"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/login.html"
  to = "/"
  status = 301
  force = true

# Light caching for fingerprinted assets (safe: filenames change on rebuild).
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
