# Netlify build config for the Piggy Plan web app (Vite static build).
# No backend, no server-side routing — Netlify just serves dist/.
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Pretty URL: serve the auth page at /login (rewrite — URL stays /login).
[[redirects]]
  from = "/login"
  to = "/login.html"
  status = 200

# Light caching for fingerprinted assets (safe: filenames change on rebuild).
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
